####################################################################################################
#####                              TX Ultimate Easy for ESPHome                                #####
#####                  Repository: https://github.com/edwardtfn/TX-Ultimate-Easy               #####
####################################################################################################
##### Purpose: ESPHome - Hardware - Relays                                                     #####
####################################################################################################
##### Author: edwardtfn - https://github.com/edwardtfn - https://buymeacoffee.com/edwardfirmo  #####
####################################################################################################
---
substitutions:
  expose_relays_leds_to_ha: false

  relay_1_mode: switch
  relay_2_mode: switch
  relay_3_mode: switch
  relay_4_mode: switch

  RELAY_1_MODE_LOWER: ${ relay_1_mode | lower }
  RELAY_2_MODE_LOWER: ${ relay_2_mode | lower }
  RELAY_3_MODE_LOWER: ${ relay_3_mode | lower }
  RELAY_4_MODE_LOWER: ${ relay_4_mode | lower }

  SL_RELAY_1_MODE: ${ 1 if RELAY_1_MODE_LOWER == "switch" else (2 if RELAY_1_MODE_LOWER == "light" else 0) }
  SL_RELAY_2_MODE: ${ 1 if RELAY_2_MODE_LOWER == "switch" else (2 if RELAY_2_MODE_LOWER == "light" else 0) }
  SL_RELAY_3_MODE: ${ 1 if RELAY_3_MODE_LOWER == "switch" else (2 if RELAY_3_MODE_LOWER == "light" else 0) }
  SL_RELAY_4_MODE: ${ 1 if RELAY_4_MODE_LOWER == "switch" else (2 if RELAY_4_MODE_LOWER == "light" else 0) }

  RELAY_MODE_TEXT_SWITCH: "Switch"
  RELAY_MODE_TEXT_LIGHT: "Light"
  RELAY_MODE_TEXT_NOT_USED: "Not in use"

  RELAYS_LIGHT_RESTORE_MODE: RESTORE_DEFAULT_OFF
  RELAYS_LIGHT_PARTITION_RESTORE_MODE: RESTORE_DEFAULT_OFF
  RELAYS_EXPOSE_LEDS_TO_HA_RESTORE_MODE: RESTORE_DEFAULT_OFF
  RELAYS_SWITCH_RESTORE_MODE: RESTORE_DEFAULT_OFF

  TAG_HW_RELAYS: tx_ultimate_easy.hw.relays

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_HW_RELAYS

globals:
  - id: boot_initialization_relays
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_group_assignments
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_light_modes
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_relay_modes
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: gb_lights_1
    type: std::vector<light::LightState*>
    restore_value: false
  - id: gb_lights_2
    type: std::vector<light::LightState*>
    restore_value: false
  - id: gb_lights_3
    type: std::vector<light::LightState*>
    restore_value: false

  - id: relay_1_state
    type: bool
    initial_value: 'false'
  - id: relay_2_state
    type: bool
    initial_value: 'false'
  - id: relay_3_state
    type: bool
    initial_value: 'false'
  - id: relay_4_state
    type: bool
    initial_value: 'false'

light:
  - id: light_output_1
    name: Light output 1
    output: output_relay_1
    platform: binary
    internal: ${SL_RELAY_1_MODE != 2 or gang_count < 1}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: |-
            id(relay_1_state) = true;
            show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: |-
            id(relay_1_state) = false;
            show_relay_status->execute();
  - id: light_output_2
    name: Light output 2
    output: output_relay_2
    platform: binary
    internal: ${SL_RELAY_2_MODE != 2 or gang_count < 2}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: |-
            id(relay_2_state) = true;
            show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: |-
            id(relay_2_state) = false;
            show_relay_status->execute();
  - id: light_output_3
    name: Light output 3
    output: output_relay_3
    platform: binary
    internal: ${SL_RELAY_3_MODE != 2 or gang_count < 3}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: |-
            id(relay_3_state) = true;
            show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: |-
            id(relay_3_state) = false;
            show_relay_status->execute();
  - id: light_output_4
    name: Light output 4
    output: output_relay_4
    platform: binary
    internal: ${SL_RELAY_4_MODE != 2 or gang_count < 4}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: |-
            id(relay_4_state) = true;
            show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: |-
            id(relay_4_state) = false;
            show_relay_status->execute();

  # ── Relay indicator lights ───────────────────────────────────────────────
  # EU physical LED map (firmware index 0-27):
  #   Top    : 20,21,22,23,24,25,26  (left→right)
  #   Right  : 13,14,15,16,17,18,19  (top→bottom)  ← board labels 20-14
  #   Bottom : 12,11,10,9,8,7,6      (left→right)  ← board labels 13-7
  #   Left   : 27,0,1,2,3,4,5        (top→bottom)  ← board labels 28,1-6
  #
  # 2-gang split: relay 1 = left half, relay 2 = right half
  #   Relay 1 half: top 20-23 | right-side 13-19 | bottom 9-12
  #   Relay 2 half: top 24-26 | left-side 27+0-5 | bottom 6-8
  #
  # The select options control which section of that half lights up:
  #   Bottom = bottom strip only
  #   Top    = top strip only
  #   Side   = the vertical side strip only (right for relay1, left for relay2)
  #   Both   = top + bottom (original behaviour)
  #   All    = top + side + bottom (full half perimeter)

  - &light_partition_relays
    id: light_rl_1_1_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    name: Light - Relay 1 of 1 (${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT})
    platform: partition
    internal: true
    disabled_by_default: false
    default_transition_length: ${default_transition_length}
    restore_mode: ${RELAYS_LIGHT_PARTITION_RESTORE_MODE}
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 9}
        to: ${12 if IS_EU_MODEL else 14}

  # 1-gang
  - id: light_rl_1_1_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 20
        to: 26
  - id: light_rl_1_1_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 27
        to: 27
      - id: light_full
        from: 0
        to: 5
      - id: light_full
        from: 13
        to: 19

  # 2-gang — relay 1 (left half)
  - id: light_rl_1_2_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${9 if IS_EU_MODEL else 20}
        to: ${12 if IS_EU_MODEL else 24}
  - id: light_rl_1_2_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${23 if IS_EU_MODEL else 28}
  - id: light_rl_1_2_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${13 if IS_EU_MODEL else 15}
        to: ${19 if IS_EU_MODEL else 19}

  # 2-gang — relay 2 (right half)
  - id: light_rl_2_2_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 9}
        to: ${8 if IS_EU_MODEL else 14}
  - id: light_rl_2_2_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${24 if IS_EU_MODEL else 29}
        to: ${26 if IS_EU_MODEL else 31}
  - id: light_rl_2_2_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}
      - id: light_full
        from: 0
        to: ${5 if IS_EU_MODEL else 8}

  # 3-gang — relay 1 (left third)
  - id: light_rl_1_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${11 if IS_EU_MODEL else 22}
        to: ${12 if IS_EU_MODEL else 23}
  - id: light_rl_1_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${21 if IS_EU_MODEL else 26}
  - id: light_rl_1_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${17 if IS_EU_MODEL else 21}
        to: ${19 if IS_EU_MODEL else 24}

  # 3-gang — relay 2 (middle third)
  - id: light_rl_2_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${9 if IS_EU_MODEL else 19}
        to: ${10 if IS_EU_MODEL else 20}
  - id: light_rl_2_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${22 if IS_EU_MODEL else 3}
        to: ${23 if IS_EU_MODEL else 4}
  - id: light_rl_2_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${14 if IS_EU_MODEL else 18}
        to: ${16 if IS_EU_MODEL else 20}

  # 3-gang — relay 3 (right third)
  - id: light_rl_3_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 16}
        to: ${7 if IS_EU_MODEL else 17}
  - id: light_rl_3_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${25 if IS_EU_MODEL else 6}
        to: ${26 if IS_EU_MODEL else 7}
  - id: light_rl_3_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}
      - id: light_full
        from: 0
        to: ${2 if IS_EU_MODEL else 3}

  # 4-gang — relay 1
  - id: light_rl_1_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${12 if IS_EU_MODEL else 23}
        to: ${12 if IS_EU_MODEL else 24}
  - id: light_rl_1_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${20 if IS_EU_MODEL else 26}
  - id: light_rl_1_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${18 if IS_EU_MODEL else 22}
        to: ${19 if IS_EU_MODEL else 24}

  # 4-gang — relay 2
  - id: light_rl_2_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${10 if IS_EU_MODEL else 21}
        to: ${11 if IS_EU_MODEL else 22}
  - id: light_rl_2_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${21 if IS_EU_MODEL else 1}
        to: ${22 if IS_EU_MODEL else 2}
  - id: light_rl_2_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${15 if IS_EU_MODEL else 19}
        to: ${17 if IS_EU_MODEL else 21}

  # 4-gang — relay 3
  - id: light_rl_3_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${8 if IS_EU_MODEL else 17}
        to: ${9 if IS_EU_MODEL else 18}
  - id: light_rl_3_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${23 if IS_EU_MODEL else 5}
        to: ${24 if IS_EU_MODEL else 6}
  - id: light_rl_3_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${13 if IS_EU_MODEL else 15}
        to: ${14 if IS_EU_MODEL else 16}
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}

  # 4-gang — relay 4
  - id: light_rl_4_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 15}
        to: ${7 if IS_EU_MODEL else 16}
  - id: light_rl_4_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${25 if IS_EU_MODEL else 7}
        to: ${26 if IS_EU_MODEL else 8}
  - id: light_rl_4_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 0
        to: ${2 if IS_EU_MODEL else 3}

output:
  - id: output_relay_1
    platform: gpio
    pin: GPIO18
  - id: output_relay_2
    platform: gpio
    pin: GPIO17
  - id: output_relay_3
    platform: gpio
    pin: GPIO27
  - id: output_relay_4
    platform: gpio
    pin: GPIO23

script:
  - id: !extend boot_initialize
    then:
      - script.execute: boot_initialize_relays

  - id: boot_initialize_relays
    mode: restart
    then:
      - script.execute: boot_initialize_relays_group_assignments
      - script.execute: boot_initialize_relays_light_modes
      - script.execute: boot_initialize_relays_relay_modes
      - script.wait: boot_initialize_relays_group_assignments
      - script.wait: boot_initialize_relays_light_modes
      - script.wait: boot_initialize_relays_relay_modes
      - wait_until:
          condition:
            - lambda: return id(boot_initialization_relays_group_assignments);
            - lambda: return id(boot_initialization_relays_light_modes);
            - lambda: return id(boot_initialization_relays_relay_modes);
      - globals.set:
          id: boot_initialization_relays
          value: 'true'

  - id: boot_initialize_relays_group_assignments
    mode: restart
    then:
      - lambda: |-
          // gb_lights_1 = Bottom strip per relay
          // gb_lights_2 = Top strip per relay
          // gb_lights_3 = Side strip per relay
          #if defined(TX_ULTIMATE_EASY_GANG_COUNT) && (TX_ULTIMATE_EASY_GANG_COUNT == 1)
          id(gb_lights_1) = { light_rl_1_1_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT} };
          id(gb_lights_2) = { light_rl_1_1_Top };
          id(gb_lights_3) = { light_rl_1_1_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 2)
          id(gb_lights_1) = { light_rl_1_2_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_2_2_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT} };
          id(gb_lights_2) = { light_rl_1_2_Top,
                              light_rl_2_2_Top };
          id(gb_lights_3) = { light_rl_1_2_Side,
                              light_rl_2_2_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 3)
          id(gb_lights_1) = { light_rl_1_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_2_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_3_3_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT} };
          id(gb_lights_2) = { light_rl_1_3_Top,
                              light_rl_2_3_Top,
                              light_rl_3_3_Top };
          id(gb_lights_3) = { light_rl_1_3_Side,
                              light_rl_2_3_Side,
                              light_rl_3_3_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 4)
          id(gb_lights_1) = { light_rl_1_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_2_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_3_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT},
                              light_rl_4_4_${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT} };
          id(gb_lights_2) = { light_rl_1_4_Top,
                              light_rl_2_4_Top,
                              light_rl_3_4_Top,
                              light_rl_4_4_Top };
          id(gb_lights_3) = { light_rl_1_4_Side,
                              light_rl_2_4_Side,
                              light_rl_3_4_Side,
                              light_rl_4_4_Side };
          #endif
          id(boot_initialization_relays_group_assignments) = true;

  - id: boot_initialize_relays_light_modes
    mode: restart
    then:
      - lambda: |-
          id(boot_initialization_relays_light_modes) = true;

  - id: boot_initialize_relays_relay_modes
    mode: restart
    then:
      - lambda: |-
          id(boot_initialization_relays_relay_modes) = true;

  - id: !extend button_click_event
    then:
      - lambda: |-
          if (click_count != 1) return;
          if (bs_multi_touch->state ||
              bs_swipe_${ID_SWIPE_LEFT_OR_UP_TEXT}->state ||
              bs_swipe_${ID_SWIPE_RIGHT_OR_DOWN_TEXT}->state) return;
          const bool api_disconnected = !global_api_server->is_connected() or
                                        !wifi_component->is_connected();
          std::string select_state;
          bool toggle_relay = false;
          switch (button) {
            case ${BUTTON_1_ID}:
              select_state = sl_button_1_action->current_option();
              toggle_relay = (select_state == "${BUTTON_1_ACTION_TEXT}" or
                              (api_disconnected and select_state == "${BUTTON_1_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_1_MODE} != 0) sw_relay_1->toggle();
              break;
            case ${BUTTON_2_ID}:
              select_state = sl_button_2_action->current_option();
              toggle_relay = (select_state == "${BUTTON_2_ACTION_TEXT}" or
                              (api_disconnected and select_state == "${BUTTON_2_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_2_MODE} != 0) sw_relay_2->toggle();
              break;
            case ${BUTTON_3_ID}:
              select_state = sl_button_3_action->current_option();
              toggle_relay = (select_state == "${BUTTON_3_ACTION_TEXT}" or
                              (api_disconnected and select_state == "${BUTTON_3_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_3_MODE} != 0) sw_relay_3->toggle();
              break;
            case ${BUTTON_4_ID}:
              select_state = sl_button_4_action->current_option();
              toggle_relay = (select_state == "${BUTTON_4_ACTION_TEXT}" or
                              (api_disconnected and select_state == "${BUTTON_4_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_4_MODE} != 0) sw_relay_4->toggle();
              break;
          }

  - id: !extend dump_config_list_packages
    then:
      - script.wait: dump_config
      - lambda: |-
          #ifndef TX_ULTIMATE_EASY_COMMON
            #error "The package TX-Ultimate-Easy-ESPHome_common.yaml is required."
          #endif
          #ifndef TX_ULTIMATE_EASY_HW_LEDS
            #error "The package TX-Ultimate-Easy-ESPHome_hw_leds.yaml is required."
          #endif
          ESP_LOGCONFIG(ESPHOME_PROJECT_NAME, "  - Hardware - Relays");

  - id: light_set_state
    mode: parallel
    parameters:
      light_group: uint8_t
      light_index: uint8_t
      state: bool
    then:
      - lambda: |-
          #ifdef TX_ULTIMATE_EASY_NIGHT_MODE
          if (sw_night_mode->state) return;
          #endif

          static const uint32_t LIGHT_TRANSITION_TURN_ON = ${LIGHT_TRANSITION_TURN_ON};
          static const uint32_t LIGHT_TRANSITION_TURN_OFF = ${LIGHT_TRANSITION_TURN_OFF};
          static const uint8_t LIGHT_BRIGHTNESS_TURN_ON = ${LIGHT_BRIGHTNESS_TURN_ON};

          std::vector<light::LightState*>* group = nullptr;
          if      (light_group == 1) group = &id(gb_lights_1);
          else if (light_group == 2) group = &id(gb_lights_2);
          else if (light_group == 3) group = &id(gb_lights_3);
          else return;

          if (light_index >= group->size()) return;

          if (state) {
            auto call = (*group)[light_index]->turn_on();
            if (LIGHT_TRANSITION_TURN_ON > 0)
              call.set_transition_length(LIGHT_TRANSITION_TURN_ON);
            if (LIGHT_BRIGHTNESS_TURN_ON > 0 and LIGHT_BRIGHTNESS_TURN_ON <= 100)
              call.set_brightness(LIGHT_BRIGHTNESS_TURN_ON / 100.0f);
            call.perform();
          } else {
            auto call = (*group)[light_index]->turn_off();
            if (LIGHT_TRANSITION_TURN_OFF > 0)
              call.set_transition_length(LIGHT_TRANSITION_TURN_OFF);
            call.perform();
          }

  - id: show_relay_status
    mode: restart
    then:
      - script.wait: boot_initialize_relays
      - lambda: |-
          if (not id(boot_initialization_relays)) {
            if (not boot_initialize_relays->is_running())
              boot_initialize_relays->execute();
            return;
          }
          for (uint8_t i = 0; i < ${gang_count}; i++) {
            bool relay_state = false;
            std::string light_mode;
            switch (i) {
              case 0: relay_state = id(relay_1_state); light_mode = sl_relay_1_light_mode->current_option(); break;
              case 1: relay_state = id(relay_2_state); light_mode = sl_relay_2_light_mode->current_option(); break;
              case 2: relay_state = id(relay_3_state); light_mode = sl_relay_3_light_mode->current_option(); break;
              case 3: relay_state = id(relay_4_state); light_mode = sl_relay_4_light_mode->current_option(); break;
            }
            if (light_mode == "${LIGHT_MODE_DISABLED_TEXT}") continue;

            bool do_bottom = (light_mode == "${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}" || light_mode == "${LIGHT_MODE_BOTH_TEXT}" || light_mode == "All");
            bool do_top    = (light_mode == "Top"                               || light_mode == "${LIGHT_MODE_BOTH_TEXT}" || light_mode == "All");
            bool do_side   = (light_mode == "Side"                              || light_mode == "All");

            if (do_bottom) light_set_state->execute(1, i, relay_state);
            if (do_top)    light_set_state->execute(2, i, relay_state);
            if (do_side)   light_set_state->execute(3, i, relay_state);
          }

select:
  - &relay_light_mode
    id: sl_relay_1_light_mode
    name: Relay 1 light mode
    platform: template
    options:
      - "${LIGHT_MODE_DISABLED_TEXT}"
      - "${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}"
      - "Top"
      - "Side"
      - "${LIGHT_MODE_BOTH_TEXT}"
      - "All"
    initial_option: "All"
    optimistic: true
    restore_value: ${gang_count >= 1}
    internal: ${gang_count < 1}
    entity_category: config
    disabled_by_default: false
    icon: mdi:dots-square
    on_value:
      - lambda: |-
          if (!id(bs_boot_completed)->state) return;
          static std::string previous_mode = "";
          std::string current_mode = x;
          if (previous_mode.empty()) { previous_mode = current_mode; return; }
          if (previous_mode != "${LIGHT_MODE_DISABLED_TEXT}" && current_mode == "${LIGHT_MODE_DISABLED_TEXT}") {
            id(light_set_state)->execute(1, 0, false);
            id(light_set_state)->execute(2, 0, false);
            id(light_set_state)->execute(3, 0, false);
          } else if (previous_mode == "${LIGHT_MODE_DISABLED_TEXT}" && current_mode != "${LIGHT_MODE_DISABLED_TEXT}") {
            bool rs = id(relay_1_state);
            if (current_mode == "${LIGHT_MODE_BOTTOM_OR_LEFT_TEXT}" || current_mode == "${LIGHT_MODE_BOTH_TEXT}" || current_mode == "All") id(light_set_state)->execute(1, 0, rs);
            if (current_mode == "Top"  || current_mode == "${LIGHT_MODE_BOTH_TEXT}" || current_mode == "All") id(light_set_state)->execute(2, 0, rs);
            if (current_mode == "Side" || current_mode == "All") id(light_set_state)->execute(3, 0, rs);
