####################################################################################################
#####                              TX Ultimate Easy for ESPHome                                #####
#####                  Repository: https://github.com/edwardtfn/TX-Ultimate-Easy               #####
####################################################################################################
##### Purpose: ESPHome - Hardware - Relays (forked: full-side LEDs + color persistence)       #####
####################################################################################################
---
substitutions:
  expose_relays_leds_to_ha: false

  relay_1_mode: switch
  relay_2_mode: switch
  relay_3_mode: switch
  relay_4_mode: switch

  RELAY_1_MODE_LOWER: ${ relay_1_mode | lower }
  RELAY_2_MODE_LOWER: ${ relay_2_mode | lower }
  RELAY_3_MODE_LOWER: ${ relay_3_mode | lower }
  RELAY_4_MODE_LOWER: ${ relay_4_mode | lower }

  SL_RELAY_1_MODE: ${ 1 if RELAY_1_MODE_LOWER == "switch" else (2 if RELAY_1_MODE_LOWER == "light" else 0) }
  SL_RELAY_2_MODE: ${ 1 if RELAY_2_MODE_LOWER == "switch" else (2 if RELAY_2_MODE_LOWER == "light" else 0) }
  SL_RELAY_3_MODE: ${ 1 if RELAY_3_MODE_LOWER == "switch" else (2 if RELAY_3_MODE_LOWER == "light" else 0) }
  SL_RELAY_4_MODE: ${ 1 if RELAY_4_MODE_LOWER == "switch" else (2 if RELAY_4_MODE_LOWER == "light" else 0) }

  RELAY_MODE_TEXT_SWITCH: "Switch"
  RELAY_MODE_TEXT_LIGHT: "Light"
  RELAY_MODE_TEXT_NOT_USED: "Not in use"

  RELAYS_LIGHT_RESTORE_MODE: RESTORE_DEFAULT_OFF
  RELAYS_SWITCH_RESTORE_MODE: RESTORE_DEFAULT_OFF

  TAG_HW_RELAYS: tx_ultimate_easy.hw.relays

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_HW_RELAYS

globals:
  - id: boot_initialization_relays
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_group_assignments
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_light_modes
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_initialization_relays_relay_modes
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: gb_lights_1
    type: std::vector<light::LightState*>
    restore_value: false
  - id: gb_lights_2
    type: std::vector<light::LightState*>
    restore_value: false
  - id: gb_lights_3
    type: std::vector<light::LightState*>
    restore_value: false

  - id: relay_1_state
    type: bool
    initial_value: 'false'
  - id: relay_2_state
    type: bool
    initial_value: 'false'
  - id: relay_3_state
    type: bool
    initial_value: 'false'
  - id: relay_4_state
    type: bool
    initial_value: 'false'

  # Stored colors per relay (RGB 0-255), persisted across reboots
  - id: relay_1_color_r
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_1_color_g
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_1_color_b
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_2_color_r
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_2_color_g
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_2_color_b
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_3_color_r
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_3_color_g
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_3_color_b
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_4_color_r
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_4_color_g
    type: uint8_t
    restore_value: true
    initial_value: '255'
  - id: relay_4_color_b
    type: uint8_t
    restore_value: true
    initial_value: '255'

light:
  - id: light_output_1
    name: Light output 1
    output: output_relay_1
    platform: binary
    internal: ${SL_RELAY_1_MODE != 2 or gang_count < 1}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: id(relay_1_state) = true; show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: id(relay_1_state) = false; show_relay_status->execute();
  - id: light_output_2
    name: Light output 2
    output: output_relay_2
    platform: binary
    internal: ${SL_RELAY_2_MODE != 2 or gang_count < 2}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: id(relay_2_state) = true; show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: id(relay_2_state) = false; show_relay_status->execute();
  - id: light_output_3
    name: Light output 3
    output: output_relay_3
    platform: binary
    internal: ${SL_RELAY_3_MODE != 2 or gang_count < 3}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: id(relay_3_state) = true; show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: id(relay_3_state) = false; show_relay_status->execute();
  - id: light_output_4
    name: Light output 4
    output: output_relay_4
    platform: binary
    internal: ${SL_RELAY_4_MODE != 2 or gang_count < 4}
    restore_mode: ${RELAYS_LIGHT_RESTORE_MODE}
    on_turn_on:
      then:
        - lambda: id(relay_4_state) = true; show_relay_status->execute();
    on_turn_off:
      then:
        - lambda: id(relay_4_state) = false; show_relay_status->execute();

  # ── Color pickers — one per relay, exposed to HA so you can set the color ──
  # These are configuration-only lights. Turning them on/off here does nothing
  # to the relay; they just store the color that will be used when the relay is on.
  - &relay_color_picker
    id: relay_1_color_light
    name: Relay 1 color
    platform: rgb
    red: relay_1_color_output_r
    green: relay_1_color_output_g
    blue: relay_1_color_output_b
    internal: ${gang_count < 1}
    disabled_by_default: false
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - lambda: |-
            auto values = id(relay_1_color_light).current_values;
            id(relay_1_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_1_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_1_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);
            show_relay_status->execute();
    on_state:
      then:
        - lambda: |-
            auto values = id(relay_1_color_light).current_values;
            id(relay_1_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_1_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_1_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);

  - id: relay_2_color_light
    name: Relay 2 color
    platform: rgb
    red: relay_2_color_output_r
    green: relay_2_color_output_g
    blue: relay_2_color_output_b
    internal: ${gang_count < 2}
    disabled_by_default: false
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    <<: *relay_color_picker
    on_turn_on:
      then:
        - lambda: |-
            auto values = id(relay_2_color_light).current_values;
            id(relay_2_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_2_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_2_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);
            show_relay_status->execute();
    on_state:
      then:
        - lambda: |-
            auto values = id(relay_2_color_light).current_values;
            id(relay_2_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_2_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_2_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);

  - id: relay_3_color_light
    name: Relay 3 color
    platform: rgb
    red: relay_3_color_output_r
    green: relay_3_color_output_g
    blue: relay_3_color_output_b
    internal: ${gang_count < 3}
    disabled_by_default: false
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    <<: *relay_color_picker
    on_turn_on:
      then:
        - lambda: |-
            auto values = id(relay_3_color_light).current_values;
            id(relay_3_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_3_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_3_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);
            show_relay_status->execute();
    on_state:
      then:
        - lambda: |-
            auto values = id(relay_3_color_light).current_values;
            id(relay_3_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_3_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_3_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);

  - id: relay_4_color_light
    name: Relay 4 color
    platform: rgb
    red: relay_4_color_output_r
    green: relay_4_color_output_g
    blue: relay_4_color_output_b
    internal: ${gang_count < 4}
    disabled_by_default: false
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    <<: *relay_color_picker
    on_turn_on:
      then:
        - lambda: |-
            auto values = id(relay_4_color_light).current_values;
            id(relay_4_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_4_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_4_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);
            show_relay_status->execute();
    on_state:
      then:
        - lambda: |-
            auto values = id(relay_4_color_light).current_values;
            id(relay_4_color_r) = (uint8_t)(values.get_red()   * values.get_brightness() * 255);
            id(relay_4_color_g) = (uint8_t)(values.get_green() * values.get_brightness() * 255);
            id(relay_4_color_b) = (uint8_t)(values.get_blue()  * values.get_brightness() * 255);

  # ── Relay indicator light partitions (all internal, not exposed to HA) ───
  - &light_partition_relays
    id: light_rl_1_1_Bottom
    name: Light - Relay 1 of 1 (Bottom)
    platform: partition
    internal: true
    disabled_by_default: false
    default_transition_length: ${default_transition_length}
    restore_mode: RESTORE_DEFAULT_OFF
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 9}
        to: ${12 if IS_EU_MODEL else 14}

  # 1-gang
  - id: light_rl_1_1_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 20
        to: 26
  - id: light_rl_1_1_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 27
        to: 27
      - id: light_full
        from: 0
        to: 5
      - id: light_full
        from: 13
        to: 19

  # 2-gang relay 1 (left)
  - id: light_rl_1_2_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${9 if IS_EU_MODEL else 20}
        to: ${12 if IS_EU_MODEL else 24}
  - id: light_rl_1_2_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${23 if IS_EU_MODEL else 28}
  - id: light_rl_1_2_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${13 if IS_EU_MODEL else 15}
        to: ${19 if IS_EU_MODEL else 19}

  # 2-gang relay 2 (right)
  - id: light_rl_2_2_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 9}
        to: ${8 if IS_EU_MODEL else 14}
  - id: light_rl_2_2_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${24 if IS_EU_MODEL else 29}
        to: ${26 if IS_EU_MODEL else 31}
  - id: light_rl_2_2_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}
      - id: light_full
        from: 0
        to: ${5 if IS_EU_MODEL else 8}

  # 3-gang relay 1
  - id: light_rl_1_3_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${11 if IS_EU_MODEL else 22}
        to: ${12 if IS_EU_MODEL else 23}
  - id: light_rl_1_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${21 if IS_EU_MODEL else 26}
  - id: light_rl_1_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${17 if IS_EU_MODEL else 21}
        to: ${19 if IS_EU_MODEL else 24}

  # 3-gang relay 2
  - id: light_rl_2_3_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${9 if IS_EU_MODEL else 19}
        to: ${10 if IS_EU_MODEL else 20}
  - id: light_rl_2_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${22 if IS_EU_MODEL else 3}
        to: ${23 if IS_EU_MODEL else 4}
  - id: light_rl_2_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${14 if IS_EU_MODEL else 18}
        to: ${16 if IS_EU_MODEL else 20}

  # 3-gang relay 3
  - id: light_rl_3_3_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 16}
        to: ${7 if IS_EU_MODEL else 17}
  - id: light_rl_3_3_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${25 if IS_EU_MODEL else 6}
        to: ${26 if IS_EU_MODEL else 7}
  - id: light_rl_3_3_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}
      - id: light_full
        from: 0
        to: ${2 if IS_EU_MODEL else 3}

  # 4-gang relay 1
  - id: light_rl_1_4_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${12 if IS_EU_MODEL else 23}
        to: ${12 if IS_EU_MODEL else 24}
  - id: light_rl_1_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${20 if IS_EU_MODEL else 26}
  - id: light_rl_1_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${18 if IS_EU_MODEL else 22}
        to: ${19 if IS_EU_MODEL else 24}

  # 4-gang relay 2
  - id: light_rl_2_4_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${10 if IS_EU_MODEL else 21}
        to: ${11 if IS_EU_MODEL else 22}
  - id: light_rl_2_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${21 if IS_EU_MODEL else 1}
        to: ${22 if IS_EU_MODEL else 2}
  - id: light_rl_2_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${15 if IS_EU_MODEL else 19}
        to: ${17 if IS_EU_MODEL else 21}

  # 4-gang relay 3
  - id: light_rl_3_4_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${8 if IS_EU_MODEL else 17}
        to: ${9 if IS_EU_MODEL else 18}
  - id: light_rl_3_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${23 if IS_EU_MODEL else 5}
        to: ${24 if IS_EU_MODEL else 6}
  - id: light_rl_3_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${13 if IS_EU_MODEL else 15}
        to: ${14 if IS_EU_MODEL else 16}
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}

  # 4-gang relay 4
  - id: light_rl_4_4_Bottom
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 15}
        to: ${7 if IS_EU_MODEL else 16}
  - id: light_rl_4_4_Top
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: ${25 if IS_EU_MODEL else 7}
        to: ${26 if IS_EU_MODEL else 8}
  - id: light_rl_4_4_Side
    internal: true
    <<: *light_partition_relays
    segments:
      - id: light_full
        from: 0
        to: ${2 if IS_EU_MODEL else 3}

# ── Dummy outputs for the color picker RGB lights ────────────────────────────
output:
  - id: output_relay_1
    platform: gpio
    pin: GPIO18
  - id: output_relay_2
    platform: gpio
    pin: GPIO17
  - id: output_relay_3
    platform: gpio
    pin: GPIO27
  - id: output_relay_4
    platform: gpio
    pin: GPIO23

  - &dummy_output
    id: relay_1_color_output_r
    platform: template
    type: float
    write_action:
      - lambda: return;
  - id: relay_1_color_output_g
    <<: *dummy_output
  - id: relay_1_color_output_b
    <<: *dummy_output
  - id: relay_2_color_output_r
    <<: *dummy_output
  - id: relay_2_color_output_g
    <<: *dummy_output
  - id: relay_2_color_output_b
    <<: *dummy_output
  - id: relay_3_color_output_r
    <<: *dummy_output
  - id: relay_3_color_output_g
    <<: *dummy_output
  - id: relay_3_color_output_b
    <<: *dummy_output
  - id: relay_4_color_output_r
    <<: *dummy_output
  - id: relay_4_color_output_g
    <<: *dummy_output
  - id: relay_4_color_output_b
    <<: *dummy_output

script:
  - id: !extend boot_initialize
    then:
      - script.execute: boot_initialize_relays

  - id: boot_initialize_relays
    mode: restart
    then:
      - script.execute: boot_initialize_relays_group_assignments
      - script.execute: boot_initialize_relays_light_modes
      - script.execute: boot_initialize_relays_relay_modes
      - script.wait: boot_initialize_relays_group_assignments
      - script.wait: boot_initialize_relays_light_modes
      - script.wait: boot_initialize_relays_relay_modes
      - wait_until:
          condition:
            - lambda: return id(boot_initialization_relays_group_assignments);
            - lambda: return id(boot_initialization_relays_light_modes);
            - lambda: return id(boot_initialization_relays_relay_modes);
      - globals.set:
          id: boot_initialization_relays
          value: 'true'

  - id: boot_initialize_relays_group_assignments
    mode: restart
    then:
      - lambda: |-
          #if defined(TX_ULTIMATE_EASY_GANG_COUNT) && (TX_ULTIMATE_EASY_GANG_COUNT == 1)
          id(gb_lights_1) = { light_rl_1_1_Bottom };
          id(gb_lights_2) = { light_rl_1_1_Top };
          id(gb_lights_3) = { light_rl_1_1_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 2)
          id(gb_lights_1) = { light_rl_1_2_Bottom, light_rl_2_2_Bottom };
          id(gb_lights_2) = { light_rl_1_2_Top,    light_rl_2_2_Top };
          id(gb_lights_3) = { light_rl_1_2_Side,   light_rl_2_2_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 3)
          id(gb_lights_1) = { light_rl_1_3_Bottom, light_rl_2_3_Bottom, light_rl_3_3_Bottom };
          id(gb_lights_2) = { light_rl_1_3_Top,    light_rl_2_3_Top,    light_rl_3_3_Top };
          id(gb_lights_3) = { light_rl_1_3_Side,   light_rl_2_3_Side,   light_rl_3_3_Side };
          #elif (TX_ULTIMATE_EASY_GANG_COUNT == 4)
          id(gb_lights_1) = { light_rl_1_4_Bottom, light_rl_2_4_Bottom, light_rl_3_4_Bottom, light_rl_4_4_Bottom };
          id(gb_lights_2) = { light_rl_1_4_Top,    light_rl_2_4_Top,    light_rl_3_4_Top,    light_rl_4_4_Top };
          id(gb_lights_3) = { light_rl_1_4_Side,   light_rl_2_4_Side,   light_rl_3_4_Side,   light_rl_4_4_Side };
          #endif
          id(boot_initialization_relays_group_assignments) = true;

  - id: boot_initialize_relays_light_modes
    mode: restart
    then:
      - lambda: id(boot_initialization_relays_light_modes) = true;

  - id: boot_initialize_relays_relay_modes
    mode: restart
    then:
      - lambda: id(boot_initialization_relays_relay_modes) = true;

  - id: !extend button_click_event
    then:
      - lambda: |-
          if (click_count != 1) return;
          if (bs_multi_touch->state ||
              bs_swipe_${ID_SWIPE_LEFT_OR_UP_TEXT}->state ||
              bs_swipe_${ID_SWIPE_RIGHT_OR_DOWN_TEXT}->state) return;
          const bool api_disconnected = !global_api_server->is_connected() or
                                        !wifi_component->is_connected();
          std::string select_state;
          bool toggle_relay = false;
          switch (button) {
            case ${BUTTON_1_ID}:
              select_state = sl_button_1_action->current_option();
              toggle_relay = (select_state == "${BUTTON_1_ACTION_TEXT}" or (api_disconnected and select_state == "${BUTTON_1_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_1_MODE} != 0) sw_relay_1->toggle();
              break;
            case ${BUTTON_2_ID}:
              select_state = sl_button_2_action->current_option();
              toggle_relay = (select_state == "${BUTTON_2_ACTION_TEXT}" or (api_disconnected and select_state == "${BUTTON_2_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_2_MODE} != 0) sw_relay_2->toggle();
              break;
            case ${BUTTON_3_ID}:
              select_state = sl_button_3_action->current_option();
              toggle_relay = (select_state == "${BUTTON_3_ACTION_TEXT}" or (api_disconnected and select_state == "${BUTTON_3_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_3_MODE} != 0) sw_relay_3->toggle();
              break;
            case ${BUTTON_4_ID}:
              select_state = sl_button_4_action->current_option();
              toggle_relay = (select_state == "${BUTTON_4_ACTION_TEXT}" or (api_disconnected and select_state == "${BUTTON_4_ACTION_FAILSAFE_TEXT}"));
              if (toggle_relay && ${SL_RELAY_4_MODE} != 0) sw_relay_4->toggle();
              break;
          }

  - id: !extend dump_config_list_packages
    then:
      - script.wait: dump_config
      - lambda: |-
          #ifndef TX_ULTIMATE_EASY_COMMON
            #error "The package TX-Ultimate-Easy-ESPHome_common.yaml is required."
          #endif
          #ifndef TX_ULTIMATE_EASY_HW_LEDS
            #error "The package TX-Ultimate-Easy-ESPHome_hw_leds.yaml is required."
          #endif
          ESP_LOGCONFIG(ESPHOME_PROJECT_NAME, "  - Hardware - Relays");

  - id: light_set_state
    mode: parallel
    parameters:
      light_group: uint8_t
      light_index: uint8_t
      state: bool
    then:
      - lambda: |-
          #ifdef TX_ULTIMATE_EASY_NIGHT_MODE
          if (sw_night_mode->state) return;
          #endif

          std::vector<light::LightState*>* group = nullptr;
          if      (light_group == 1) group = &id(gb_lights_1);
          else if (light_group == 2) group = &id(gb_lights_2);
          else if (light_group == 3) group = &id(gb_lights_3);
          else return;
          if (light_index >= group->size()) return;

          // Resolve which relay index this light_index corresponds to for color lookup
          // light_index == relay index (0-based)
          uint8_t r = 255, g = 255, b = 255;
          switch (light_index) {
            case 0: r = id(relay_1_color_r); g = id(relay_1_color_g); b = id(relay_1_color_b); break;
            case 1: r = id(relay_2_color_r); g = id(relay_2_color_g); b = id(relay_2_color_b); break;
            case 2: r = id(relay_3_color_r); g = id(relay_3_color_g); b = id(relay_3_color_b); break;
            case 3: r = id(relay_4_color_r); g = id(relay_4_color_g); b = id(relay_4_color_b); break;
          }

          if (state) {
            auto call = (*group)[light_index]->turn_on();
            call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
            call.set_brightness(1.0f);
            call.set_transition_length(0);
            call.perform();
          } else {
            auto call = (*group)[light_index]->turn_off();
            call.set_transition_length(0);
            call.perform();
          }

  - id: show_relay_status
    mode: restart
    then:
      - script.wait: boot_initialize_relays
      - lambda: |-
          if (not id(boot_initialization_relays)) {
            if (not boot_initialize_relays->is_running()) boot_initialize_relays->execute();
            return;
          }
          for (uint8_t i = 0; i < ${gang_count}; i++) {
            bool relay_state = false;
            bool leds_enabled = false;
            switch (i) {
              case 0: relay_state = id(relay_1_state); leds_enabled = sw_relay_1_leds->state; break;
              case 1: relay_state = id(relay_2_state); leds_enabled = sw_relay_2_leds->state; break;
              case 2: relay_state = id(relay_3_state); leds_enabled = sw_relay_3_leds->state; break;
              case 3: relay_state = id(relay_4_state); leds_enabled = sw_relay_4_leds->state; break;
            }
            bool on = relay_state && leds_enabled;
            light_set_state->execute(1, i, on);
            light_set_state->execute(2, i, on);
            light_set_state->execute(3, i, on);
          }

switch:
  - id: sw_relay_1
    name: Relay 1
    internal: ${SL_RELAY_1_MODE != 1 or gang_count < 1}
    restore_mode: ${RELAYS_SWITCH_RESTORE_MODE}
    platform: template
    lambda: return id(relay_1_state);
    turn_on_action:
      - lambda: id(relay_1_state) = true;
      - light.turn_on: light_output_1
    turn_off_action:
      - lambda: id(relay_1_state) = false;
      - light.turn_off: light_output_1

  - id: sw_relay_2
    name: Relay 2
    internal: ${SL_RELAY_2_MODE != 1 or gang_count < 2}
    restore_mode: ${RELAYS_SWITCH_RESTORE_MODE}
    platform: template
    lambda: return id(relay_2_state);
    turn_on_action:
      - lambda: id(relay_2_state) = true;
      - light.turn_on: light_output_2
    turn_off_action:
      - lambda: id(relay_2_state) = false;
      - light.turn_off: light_output_2

  - id: sw_relay_3
    name: Relay 3
    internal: ${SL_RELAY_3_MODE != 1 or gang_count < 3}
    restore_mode: ${RELAYS_SWITCH_RESTORE_MODE}
    platform: template
    lambda: return id(relay_3_state);
    turn_on_action:
      - lambda: id(relay_3_state) = true;
      - light.turn_on: light_output_3
    turn_off_action:
      - lambda: id(relay_3_state) = false;
      - light.turn_off: light_output_3

  - id: sw_relay_4
    name: Relay 4
    internal: ${SL_RELAY_4_MODE != 1 or gang_count < 4}
    restore_mode: ${RELAYS_SWITCH_RESTORE_MODE}
    platform: template
    lambda: return id(relay_4_state);
    turn_on_action:
      - lambda: id(relay_4_state) = true;
      - light.turn_on: light_output_4
    turn_off_action:
      - lambda: id(relay_4_state) = false;
      - light.turn_off: light_output_4

  # ── LED enable switches (replaces the old light mode select) ─────────────
  - &relay_led_switch
    id: sw_relay_1_leds
    name: Relay 1 LEDs
    icon: mdi:led-on
    platform: template
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    internal: ${gang_count < 1}
    lambda: return true;
    turn_on_action:
      - lambda: show_relay_status->execute();
    turn_off_action:
      - lambda: |-
          light_set_state->execute(1, 0, false);
          light_set_state->execute(2, 0, false);
          light_set_state->execute(3, 0, false);

  - id: sw_relay_2_leds
    name: Relay 2 LEDs
    internal: ${gang_count < 2}
    <<: *relay_led_switch
    turn_on_action:
      - lambda: show_relay_status->execute();
    turn_off_action:
      - lambda: |-
          light_set_state->execute(1, 1, false);
          light_set_state->execute(2, 1, false);
          light_set_state->execute(3, 1, false);

  - id: sw_relay_3_leds
    name: Relay 3 LEDs
    internal: ${gang_count < 3}
    <<: *relay_led_switch
    turn_on_action:
      - lambda: show_relay_status->execute();
    turn_off_action:
      - lambda: |-
          light_set_state->execute(1, 2, false);
          light_set_state->execute(2, 2, false);
          light_set_state->execute(3, 2, false);

  - id: sw_relay_4_leds
    name: Relay 4 LEDs
    internal: ${gang_count < 4}
    <<: *relay_led_switch
    turn_on_action:
      - lambda: show_relay_status->execute();
    turn_off_action:
      - lambda: |-
          light_set_state->execute(1, 3, false);
          light_set_state->execute(2, 3, false);
          light_set_state->execute(3, 3, false);
...
